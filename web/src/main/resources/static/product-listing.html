<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fantasy CardWerx — Products</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="product-listing.css" />
</head>
<body>
<header class="site-header">
    <div class="brand">
        <a href="index.html" class="logo-link" aria-label="Fantasy CardWerx home">
            <svg class="logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <rect x="4" y="8" width="56" height="48" rx="6" ry="6" />
                <path d="M16 22h32M16 30h32M16 38h32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </a>

        <div class="title-block">
            <a href="index.html" class="store-name-link">
                <h1 class="store-name">Fantasy CardWerx</h1>
            </a>
            <div class="tagline">APJ Store — Browse all products</div>
        </div>

        <nav class="header-nav" aria-label="Main navigation">
            <a href="index.html" class="nav-link">Home</a>
            <a href="product-listing.html" class="nav-link active">Browse Products</a>
        </nav>

        <form id="searchFormPL" class="search-form" role="search" aria-label="Search products">
            <input id="searchInputPL" class="search-input" type="search" name="q" placeholder="Search cards, specialty, contributor..." autocomplete="off" />
            <button class="search-btn" type="submit">Search</button>
        </form>
    </div>
</header>

<main class="main listing-main">
    <aside id="listingSidebar" class="listing-sidebar" aria-label="Filters and sort">
        <h3 class="sidebar-title">Sort &amp; Filter</h3>

        <div class="sidebar-block">
            <label for="sortBy">Sort by</label>
            <select id="sortBy" class="sidebar-select" aria-label="Sort results by">
                <option value="">Default</option>
                <option value="price">Price</option>
                <option value="name">Name</option>
            </select>
        </div>

        <div class="sidebar-block">
            <label for="filterSpecialty">Filter by specialty</label>
            <select id="filterSpecialty" class="sidebar-select" aria-label="Specialty filter">
                <option value="">All specialties</option>
            </select>
        </div>

        <div class="sidebar-block">
            <label for="filterMinPrice">Filter by price range</label>
            <div class="price-range">
                <input id="filterMinPrice" class="sidebar-input price-input" type="number" min="0" step="0.01" placeholder="Min" aria-label="Minimum price" />
                <span class="price-sep">–</span>
                <input id="filterMaxPrice" class="sidebar-input price-input" type="number" min="0" step="0.01" placeholder="Max" aria-label="Maximum price" />
            </div>
            <button id="applyPrice" type="button" class="sidebar-btn">Apply</button>
        </div>

        <button id="clearFilters" type="button" class="sidebar-btn sidebar-btn-secondary">Clear filters</button>
    </aside>

    <section class="listing-content">
        <div class="products-hero">
            <h2 id="resultsHeading">Products</h2>
            <p id="resultsSummary" class="lead">Loading products…</p>
        </div>

        <div id="products" class="cards-section">
            <div id="statusPL" class="status">Loading products…</div>
            <div id="productsGrid" class="products-grid" hidden></div>

            <div id="pagination" class="pagination" hidden aria-label="Pagination"></div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div>Fantasy CardWerx</div>
        <div>1234 Mockingbird Lane • Boise, ID</div>
        <div>Email: info@fantasycardwerx.example • Phone: (555) 555-5555</div>
    </div>
</footer>

<script src="product-listing.js" defer></script>
</body>
</html>
