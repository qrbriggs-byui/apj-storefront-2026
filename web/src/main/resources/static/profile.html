<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Fantasy CardWerx — My profile</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
</head>
<body>
<header class="site-header">
    <div class="brand">
        <a href="index.html" class="logo-link" aria-label="Fantasy CardWerx home">
            <svg class="logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <rect x="4" y="8" width="56" height="48" rx="6" ry="6" />
                <path d="M16 22h32M16 30h32M16 38h32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </a>
        <div class="title-block">
            <a href="index.html" class="store-name-link">
                <h1 class="store-name">Fantasy CardWerx</h1>
            </a>
            <div class="tagline">APJ Store — Your profile (view only)</div>
        </div>
        <nav class="header-nav" aria-label="Main navigation">
            <a href="index.html" class="nav-link">Home</a>
            <a href="product-listing.html" class="nav-link">Browse Products</a>
            <a href="cart.html" class="nav-link">Cart</a>
            <span class="account-nav" aria-label="Account">
                <a href="profile.html" class="nav-link account-link" aria-label="Account">
                    <svg class="account-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                    <span class="account-label">Account</span>
                </a>
            </span>
        </nav>
    </div>
</header>

<main class="main">
    <section class="auth-panel">
        <h2>Your profile</h2>
        <p id="profileStatus" class="auth-error" style="color:inherit"></p>
        <div id="profileForm">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" type="text" readonly />
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" type="text" readonly />
            <label for="shippingZip">Shipping ZIP code</label>
            <input id="shippingZip" name="shippingZip" type="text" readonly />
        </div>
        <div class="profile-actions">
            <form method="post" action="/auth/logout" class="profile-logout-form">
                <button type="submit" class="auth-submit profile-logout-btn">Log out</button>
            </form>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div>Fantasy CardWerx</div>
        <div>1234 Mockingbird Lane • Boise, ID</div>
    </div>
</footer>
<script src="profile.js" defer></script>
</body>
</html>
