# Application identity
spring.application.name=web
#spring.profiles.active=dev

# Default server port
server.port=8080

# Actuator configuration
management.endpoints.web.exposure.include=health,info

# Info endpoint metadata
info.app.name=${spring.application.name}
info.app.version=1.0
info.app.description=APJ Storefront REST API

# Swagger / OpenAPI configuration
springdoc.swagger-ui.path=/docs
springdoc.api-docs.title=APJ Storefront API
springdoc.api-docs.description=REST API for managing Card resources

# web module properties
card.api.base-url=http://localhost:8081