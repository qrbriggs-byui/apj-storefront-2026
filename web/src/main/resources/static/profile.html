<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My profile — Fantasy CardWerx</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
</head>
<body>
<header class="site-header">
    <div class="brand">
        <a href="index.html" class="logo-link" aria-label="Fantasy CardWerx home">
            <svg class="logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <rect x="4" y="8" width="56" height="48" rx="6" ry="6" />
                <path d="M16 22h32M16 30h32M16 38h32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </a>
        <div class="title-block">
            <a href="index.html" class="store-name-link">
                <h1 class="store-name">Fantasy CardWerx</h1>
            </a>
            <div class="tagline">Your account</div>
        </div>
        <nav class="header-nav" aria-label="Main navigation">
            <a href="index.html" class="nav-link">Home</a>
            <a href="product-listing.html" class="nav-link">Browse Products</a>
            <a href="cart.html" class="nav-link">Cart</a>
            <a href="profile.html" class="nav-link nav-account active" aria-current="page" aria-label="Account">
                <svg class="nav-account-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" width="20" height="20">
                    <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span class="nav-account-text">Account</span>
            </a>
        </nav>
    </div>
</header>

<main class="main profile-main">
    <section class="profile-card" aria-labelledby="profile-title">
        <h2 id="profile-title">Profile</h2>
        <p class="profile-note">This page is read-only for this milestone.</p>
        <dl class="profile-dl">
            <dt>Name</dt>
            <dd id="profileName">Loading…</dd>
            <dt>Zip code</dt>
            <dd id="profileZip">Loading…</dd>
        </dl>
        <p id="profileError" class="profile-error" hidden></p>
        <form method="post" action="/logout" class="profile-logout-form">
            <button type="submit" class="auth-submit profile-logout-btn">Log out</button>
        </form>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div>Fantasy CardWerx</div>
    </div>
</footer>

<script>
(function () {
    const nameEl = document.getElementById("profileName");
    const zipEl = document.getElementById("profileZip");
    const errEl = document.getElementById("profileError");
    fetch("/api/me/profile", { credentials: "same-origin" })
        .then(function (r) {
            if (!r.ok) throw new Error("Could not load profile.");
            return r.json();
        })
        .then(function (data) {
            nameEl.textContent = data.name || "—";
            zipEl.textContent = data.zipCode || "—";
        })
        .catch(function () {
            errEl.hidden = false;
            errEl.textContent = "Unable to load profile. Try refreshing the page.";
            nameEl.textContent = "—";
            zipEl.textContent = "—";
        });
})();
</script>
</body>
</html>
