spring.application.name=db
server.port=8083

# HS256 signing key — must be long enough (>= 256 bits). Use a strong random secret in production.
app.jwt.secret=apj-storefront-dev-jwt-secret-change-me-please-use-32bytes-minimum!!

# Enable debug logging
logging.level.org.springframework.web=INFO

# H2 configuration
spring.datasource.url=jdbc:h2:mem:apj-storefront
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true

# Allow us to see the generated SQL in the debug logs
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=INFO

# Actuator: expose health and info over HTTP
management.endpoints.web.exposure.include=health,info

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/docs

# Apache Artemis (JMS producer — order completed events)
spring.artemis.mode=native
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=admin
spring.artemis.password=admin
app.jms.order-confirmation-queue=order.confirmation