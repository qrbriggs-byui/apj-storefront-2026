<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Fantasy CardWerx — Product</title>

    <!-- Roboto -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="product.css" />
</head>
<body>
<header class="site-header">
    <div class="brand">
        <a href="index.html" class="logo-link" aria-label="Fantasy CardWerx home">
            <svg class="logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <rect x="4" y="8" width="56" height="48" rx="6" ry="6" />
                <path d="M16 22h32M16 30h32M16 38h32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </a>

        <div class="title-block">
            <a href="index.html" class="store-name-link">
                <h1 class="store-name">Fantasy CardWerx</h1>
            </a>
            <div class="tagline">APJ Store — Product details</div>
        </div>

        <nav class="header-nav" aria-label="Main navigation">
            <a href="index.html" class="nav-link">Home</a>
            <a href="product-listing.html" class="nav-link">Browse Products</a>
            <a href="cart.html" class="nav-link">Cart</a>
            <a href="profile.html" class="nav-link nav-account" aria-label="Account">
                <svg class="nav-account-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" width="20" height="20">
                    <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span class="nav-account-text">Account</span>
            </a>
        </nav>

        <form id="searchFormP" class="search-form" role="search" aria-label="Search products">
            <input id="searchInputP" class="search-input" type="search" name="q" placeholder="Search cards, specialty, contributor..." autocomplete="off" />
            <button class="search-btn" type="submit">Search</button>
        </form>
    </div>
</header>

<main class="main">
    <section id="productArea" class="product-area">
        <div id="productStatus" class="status">Loading product…</div>

        <div id="productInner" class="product-inner" hidden>
            <!-- left: image -->
            <div class="product-media-column">
                <article id="productCard" class="card product-card" aria-live="polite">
                    <div id="productMedia" class="card-media" role="img" aria-label="Product image"></div>
                </article>
            </div>

            <!-- right: details -->
            <div class="product-content-column">
                <article class="card" style="padding:14px;">
                    <div class="card-content">
                        <h2 id="productTitle" class="card-title">Product title</h2>

                        <div id="productMeta" class="card-meta product-meta-compact" style="margin-top:6px;">
                            <div class="meta-row">
                                <!-- Specialty shown here -->
                                <div id="productSpecialty" class="meta-left">Specialty: —</div>
                                <div id="productPrice" class="price">—</div>
                            </div>
                            <div class="meta-row">
                                <!-- Contribution shown here -->
                                <div id="productContribution" class="meta-left">Contribution: —</div>
                                <div>
                                    <a id="backToList" class="nav-link" href="product-listing.html">← Back to products</a>
                                </div>
                            </div>
                        </div>

                        <form id="addToCartForm" class="add-to-cart-form" action="/cart/add" method="post" style="margin-top:12px;">
                            <input type="hidden" name="productId" id="formProductId" value="" />
                            <input type="hidden" name="productName" id="formProductName" value="" />
                            <input type="hidden" name="price" id="formPrice" value="0" />
                            <label for="formQuantity" class="sr-only">Quantity</label>
                            <input type="number" id="formQuantity" name="quantity" min="1" value="1" class="qty-input" aria-label="Quantity" />
                            <button type="submit" class="btn btn-primary">Add to Cart</button>
                        </form>

                        <!-- No description field in model; intentionally omitted -->
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div>Fantasy CardWerx</div>
        <div>1234 Mockingbird Lane • Boise, ID</div>
        <div>Email: info@fantasycardwerx.example • Phone: (555) 555-555-5555</div>
    </div>
</footer>

<script src="product.js" defer></script>
</body>
</html>
