<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Log in — Fantasy CardWerx</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
</head>
<body>
<header class="site-header">
    <div class="brand">
        <a href="index.html" class="logo-link" aria-label="Fantasy CardWerx home">
            <svg class="logo" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
                <rect x="4" y="8" width="56" height="48" rx="6" ry="6" />
                <path d="M16 22h32M16 30h32M16 38h32" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </a>
        <div class="title-block">
            <a href="index.html" class="store-name-link">
                <h1 class="store-name">Fantasy CardWerx</h1>
            </a>
            <div class="tagline">Sign in to your account</div>
        </div>
    </div>
</header>

<main class="main auth-main">
    <section class="auth-card" aria-labelledby="login-title">
        <h2 id="login-title">Log in</h2>
        <p class="auth-hint">Use the demo accounts from your course materials (e.g. shopper / manager).</p>
        <form class="auth-form" method="post" action="/login" autocomplete="on">
            <label class="auth-label" for="username">Username</label>
            <input class="auth-input" id="username" name="username" type="text" required autocomplete="username" />

            <label class="auth-label" for="password">Password</label>
            <input class="auth-input" id="password" name="password" type="password" required autocomplete="current-password" />

            <button class="auth-submit" type="submit">Log in</button>
        </form>
        <p class="auth-footer"><a href="index.html" class="auth-footer-link">Back to home</a></p>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div>Fantasy CardWerx</div>
    </div>
</footer>
</body>
</html>
